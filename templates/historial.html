<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Consultas | Generador Jurídico</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 30px;
        }
        .card-header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 25px 30px;
        }
        .card-header h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .card-body { padding: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f0f0f0; color: #2c3e50; }
        tr:hover { background: #f9f9f9; }
        .btn-volver {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .ver-prompt {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            border-radius: 10px;
        }
        .close { float: right; cursor: pointer; font-size: 28px; }
        pre { white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>📋 Historial de Consultas Jurídicas</h1>
                <p>Todos los prompts generados y datos de usuarios</p>
            </div>
            <div class="card-body">
                <a href="/" class="btn-volver">← Volver al generador</a>
                <div id="historial"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Prompt Generado</h3>
            <pre id="modal-prompt"></pre>
        </div>
    </div>

    <script>
        async function cargarHistorial() {
            const response = await fetch('/historial');
            const data = await response.json();
            
            if (data.success && data.archivos.length > 0) {
                let html = '<table><tr><th>Fecha</th><th>Usuario</th><th>Área Legal</th><th>Acciones</th></tr>';
                for (const archivo of data.archivos) {
                    html += `<tr>
                        <td>${archivo.fecha}</td>
                        <td>${archivo.usuario}</td>
                        <td>${archivo.area_legal}</td>
                        <td><button class="ver-prompt" onclick='verPrompt(${JSON.stringify(archivo.prompt)})'>Ver Prompt</button></td>
                    </tr>`;
                }
                html += '赶</table>';
                document.getElementById('historial').innerHTML = html;
            } else {
                document.getElementById('historial').innerHTML = '<p>No hay consultas guardadas aún.</p>';
            }
        }
        
        function verPrompt(prompt) {
            document.getElementById('modal-prompt').textContent = prompt;
            document.getElementById('modal').style.display = 'block';
        }
        
        document.querySelector('.close').onclick = function() {
            document.getElementById('modal').style.display = 'none';
        }
        
        window.onclick = function(event) {
            if (event.target == document.getElementById('modal')) {
                document.getElementById('modal').style.display = 'none';
            }
        }
        
        cargarHistorial();
    </script>
</body>
</html>
